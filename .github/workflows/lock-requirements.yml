name: lock-requirements

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - requirements.in
      - .github/workflows/lock-requirements.yml

jobs:
  lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-tools
        run: python -m pip install --upgrade pip pip-tools

      - name: Compile requirements.txt
        run: pip-compile --upgrade --resolver=backtracking --output-file requirements.txt requirements.in

      - name: Open dependency lock PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/lock-requirements
          delete-branch: true
          commit-message: "chore: refresh locked requirements"
          title: "chore: refresh locked requirements"
          body: |
            This automated PR refreshes `requirements.txt` from `requirements.in`
            using `pip-compile`.
